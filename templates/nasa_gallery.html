{% extends "base.html" %}
{% block title %}NASA Gallery{% endblock %}

{% block content %}
<section class="page-section">
    <div class="page-header">
        <h1 class="page-title">🚀 NASA Live Gallery</h1>
        <p class="page-subtitle">Real-time images from NASA</p>
    </div>

    <div class="gallery-grid">
        {% for item in gallery_items %}
        <div class="gallery-item">
            <img src="{{ item.image }}" alt="{{ item.title }}" class="gallery-img">
            <div class="gallery-overlay">
                <h3>{{ item.title }}</h3>
                <p>{{ item.desc }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
