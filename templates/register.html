{% extends "base.html" %}
{% block title %}Register - Stellar Gateway{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🌟</div>
                <h2>Join the Mission</h2>
                <p>Create your account and explore the universe</p>
            </div>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <span class="label-icon">👤</span>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Choose a username" minlength="3" autocomplete="username">
                    <div class="input-glow"></div>
                </div>
                <div class="form-group">
                    <label for="email">
                        <span class="label-icon">📧</span>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required 
                           placeholder="your@email.com" autocomplete="email">
                    <div class="input-glow"></div>
                </div>
                <div class="form-group">
                    <label for="password">
                        <span class="label-icon">🔒</span>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
                    <div class="input-glow"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">
                        <span class="label-icon">🔐</span>
                        Confirm Password
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           placeholder="Re-enter password" autocomplete="new-password">
                    <div class="input-glow"></div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Create Account 🌟</span>
                    <span class="btn-glow"></span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login Here</a></p>
            </div>
        </div>
        <div class="auth-visual">
            <div class="floating-astronaut">👨‍🚀</div>
            <div class="floating-planet floating-1">🪐</div>
            <div class="floating-planet floating-2">🌙</div>
            <div class="floating-planet floating-3">⭐</div>
        </div>
    </div>
</section>
{% endblock %}
